<!DOCTYPE html>
<html>
<head>
    <title>AI Song Separator Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:90%;
            max-width:500px;
            background:#1e293b;
            padding:25px;
            border-radius:20px;
            text-align:center;
        }

        button{
            background:#22c55e;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            font-size:16px;
        }

        #result{
            margin-top:20px;
            display:none;
            color:#22c55e;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎵 AI Song Separator Pro</h1>

    <p>Upload your song and separate vocals & instrumental.</p>

    <input type="file" id="song">

    <br><br>

    <button onclick="separateSong()">Separate Song</button>

    <div id="result">
        ✅ Song uploaded successfully!<br><br>
        🎤 Vocals Ready<br>
        🎹 Instrumental Ready
    </div>
</div>

<script>
function separateSong(){
    document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
